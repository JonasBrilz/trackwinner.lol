steps:
  - name: gcr.io/cloud-builders/docker
    dir: backend
    args:
      - build
      - -t
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/hackathon
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/hackathon

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    args:
      - gcloud
      - run
      - deploy
      - hackathon
      - --image=europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/hackathon
      - --region=europe-west1
      - --allow-unauthenticated

options:
  logging: CLOUD_LOGGING_ONLY
